---
# Secrets inventory — pointers ONLY.
# This file lists what secrets exist, where they live, and how to rotate them.
# DO NOT put secret values here. DO NOT commit any secret to this repo.

version: 1

secrets:
  # ── SSH ────────────────────────────────────────────────────────────────
  - id: ssh-ed25519-private
    purpose: GitHub SSH auth for github.com
    location: ~/.ssh/id_ed25519
    location_mode: 0600 ubuntu:ubuntu
    rotation: |
      ssh-keygen -t ed25519 -C "edsadr+ai@gmail.com" -f ~/.ssh/id_ed25519 -N ""
      # Then add the public key to https://github.com/settings/keys and remove the old one.
    backstop: "If lost, server still has authorized_keys; user can ssh in and re-bootstrap."

  # ── GitHub ─────────────────────────────────────────────────────────────
  - id: gh-pat-merc
    purpose: "gh CLI auth (account: mercutio-ai)"
    location: ~/.config/gh/hosts.yml
    rotation: |
      # See: ~/.hermes/skills/github-workflow/references/auth-setup.md
      gh auth login --with-token --insecure-storage < /path/to/new-token.txt
    scopes: "repo, workflow, read:org"

  - id: gh-token-env
    purpose: GITHUB_TOKEN env var (for one-off curl calls)
    location: env var, also persisted in ~/.hermes/.env
    rotation: |
      # Create a new PAT at https://github.com/settings/tokens
      # Update ~/.hermes/.env GITHUB_TOKEN= line
    note: "Sourced at shell startup from ~/.hermes/.env; do not commit .env"

  # ── oauth2-proxy ───────────────────────────────────────────────────────
  - id: oauth2-client-secret
    purpose: GitHub OAuth app client secret
    location: ~/.config/oauth2-proxy/oauth2-proxy.cfg
    rotation: |
      # Regenerate at https://github.com/settings/developers (OAuth app)
      # Edit the `client_secret =` line and `systemctl --user restart oauth2-proxy`
    rotation_caveat: "Restarting oauth2-proxy invalidates all live sessions."

  - id: oauth2-cookie-secret
    purpose: Signing key for oauth2-proxy session cookies
    location: ~/.config/oauth2-proxy/oauth2-proxy.cfg
    rotation: |
      # `openssl rand -hex 32` then paste into `cookie_secret =`
      # CRITICAL: rotating this logs every user out immediately
    rotation_caveat: "Do not rotate casually. Schedule for a maintenance window."

  # ── Hermes (default profile) ────────────────────────────────────────────
  - id: hermes-env
    purpose: Hermes default-profile runtime secrets (model API keys, channel tokens)
    location: ~/.hermes/.env
    rotation: "Varies by key. See Hermes docs for each provider."
    backstop: "Hermes will refuse to boot without .env; the file is the source of truth."
    note: |
      Per-profile .env files under ~/.hermes/profiles/<name>/.env are
      auto-discovered by backup-secrets.sh and emitted as
      `hermes_profile_<name>_env` b64 blocks (one per profile, no
      inventory edit required). Their `GITHUB_TOKEN` values are also
      surfaced as `gh_token_env_profile_<name>` scalars so a restore
      can put the right token in the right file.

  # ── Goose ──────────────────────────────────────────────────────────────
  - id: goose-secrets
    purpose: Goose AI provider API keys
    location: ~/.config/goose/secrets.yaml
    location_mode: 0600 ubuntu:ubuntu
    rotation: "Per-provider; edit secrets.yaml and restart the goose session."

  # ── Letsencrypt ────────────────────────────────────────────────────────
  - id: letsencrypt-account-key
    purpose: ACME account key for cert issuance/renewal
    location: /etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org/directory/*/account_key.json
    rotation: "Rare. Certbot rotates this only if explicitly told. Renewal happens automatically via the certbot systemd timer."
    critical: false

  - id: letsencrypt-privkey-mercury
    purpose: Private key for mercury.garden cert
    location: /etc/letsencrypt/live/mercury.garden/privkey.pem
    rotation: "Re-run `certbot certonly --nginx -d mercury.garden` to force renewal; certbot handles key rotation when needed."
    critical: true
    note: "Losing this means mercury.garden goes HTTPS-down until certbot re-issues. Renew is automatic via the certbot timer."

  # ── tasks-mercury (the API we're using right now) ──────────────────────
  - id: mercury-tasks-tokens
    purpose: Bearer tokens for machine-to-machine tasks-mercury API calls
    location: /home/ubuntu/.config/mercury-tasks/tokens.json
    rotation: |
      # Edit the file (replace `token` value, keep `user` constant for audit log consistency).
      # Restart the server: `systemctl --user restart mercury-tasks`
      # The file is gitignored in the mercury-tasks repo.
      # The in-repo `~/data/code/mercury-tasks/config/tokens.json` is only a template
      # copy; real tokens live at the location above (overridden by the systemd unit
      # via the `MERCURY_TASKS_CONFIG` env var).
    note: "File mode is 0600; values are 32-byte hex strings."

  # ── GitHub CLI ─────────────────────────────────────────────────────────
  - id: gh-hosts-yml
    purpose: GitHub CLI auth (oauth_token + user mapping for `gh` commands)
    location: ~/.config/gh/hosts.yml
    location_mode: 0600 ubuntu:ubuntu
    rotation: |
      # Re-auth: `gh auth login --with-token < token.txt`
      # Or copy an existing hosts.yml from a backup.
    note: "Captured as `gh_hosts_yml` in `~/.secrets/secrets.yaml`."

  # ── ssh-ed25519 public key ─────────────────────────────────────────────
  - id: ssh-ed25519-public
    purpose: Public half of GitHub SSH auth key (registered on github.com)
    location: ~/.ssh/id_ed25519.pub
    rotation: |
      # Public half is regenerated whenever ssh-ed25519-private is rotated.
      # Re-register the new pubkey at https://github.com/settings/keys.
    backstop: "If lost, regenerate from private key with `ssh-keygen -y -f ~/.ssh/id_ed25519`."

  # ── Letsencrypt privkey (alias for letsencrypt-privkey-mercury) ────────
  - id: letsencrypt-privkey
    purpose: Private key for mercury.garden certificate
    location: /etc/letsencrypt/live/mercury.garden/privkey.pem
    rotation: "Re-run `certbot certonly --nginx -d mercury.garden` to force renewal; certbot handles key rotation when needed."
    critical: true
    note: "Losing this means mercury.garden goes HTTPS-down until certbot re-issues. Captured as `letsencrypt_privkey` in `~/.secrets/secrets.yaml`."

  # ── Auto-discovered code/.env* files ────────────────────────────────────
  # Every `.env*` file under ~/data/code/ is captured by backup-secrets.sh
  # as a `code_env_<sanitized-path>` b64 block (excludes *.example / *.sample
  # templates). Adding a new project with a .env needs no edit here OR in
  # backup-secrets.sh — the discovery is automatic.
  - id: code-env-files
    purpose: Auto-discovered .env* files for every project under ~/data/code/
    location: ~/data/code/**/.env*  (excludes *.example and *.sample)
    rotation: |
      Per-project — edit the .env, then re-run `bash scripts/backup-secrets.sh --force`
      to refresh ~/.secrets/secrets.yaml. Restore one with
        bash scripts/restore-secrets.sh --env <path-or-kind>
      or all with
        bash scripts/restore-secrets.sh --include code-env
      Sanitized kind for ~/data/code/<repo>/<subdir>/.env<suffix> is
      `code_env_<repo>_<subdir>_env<suffix>` (slashes and dots become
      underscores, lowercase; see scripts/backup-secrets.sh: sanitize_env_kind).
    note: |
      File mode must be 0600. Files with mode != 0600 are still captured
      (the audit catches drift via scripts/audit.sh [project_env]) and the
      restore normalizes mode to 0600.
      Replaces the deprecated per-project entries x-digest-env and
      scriptcaster-env (PR feat/secrets-auto-discover-code-env, 2026-07-07).
      Those ids remain as ALIASES in scripts/backup-secrets.sh (x_digest_env
      / scriptcaster_env b64 blocks) so old --include filters keep working,
      but no inventory pointer is needed for them anymore.

  # ── x-digest (DEPRECATED alias) ────────────────────────────────────────
  # Kept as documentation only — the real capture moved to code-env-files
  # (see above). The x_digest_env b64 block in ~/.secrets/secrets.yaml is
  # still emitted for back-compat with existing restore --include x-digest
  # invocations; both aliases point at the same ~/data/code/x-digest/.env
  # file. No edit required here when this file is updated.
  # - id: x-digest-env        # DEPRECATED 2026-07-07 → code-env-files

  # ── scriptcaster (DEPRECATED alias) ────────────────────────────────────
  # Kept as documentation only — see x-digest note above. The scriptcaster_env
  # b64 block still emits for back-compat.
  # - id: scriptcaster-env    # DEPRECATED 2026-07-07 → code-env-files

  # ── openchamber ────────────────────────────────────────────────────────
  - id: openchamber-startup-env
    purpose: openchamber service secrets (channel routing, API keys)
    location: ~/.config/openchamber/startup.env
    rotation: |
      # Edit the env file and restart: `systemctl --user restart openchamber`.
    note: "File mode is 0600."

  # ── omniroute ──────────────────────────────────────────────────────────
  # Added 2026-07-24 (PR for omniroute backup coverage). STORAGE_ENCRYPTION_KEY
  # in ~/.omniroute/.env decrypts storage.sqlite (request history, provider
  # config). Without this key, the sqlite is unreadable; the daily state
  # tarball ALSO captures the file (backup-mercury-state.sh), but the
  # secrets.yaml layer is the canonical store. Mirrors openchamber-startup-env.
  - id: omniroute-env
    purpose: omniroute runtime secrets (STORAGE_ENCRYPTION_KEY decrypts storage.sqlite)
    location: ~/.omniroute/.env
    rotation: |
      # Delete ~/.omniroute/.env and ~/.omniroute/storage.sqlite; restart
      # omniroute.service. The first launch will mint a fresh key + empty
      # sqlite. ALL prior call history / provider config is lost on rotation.
    note: "File mode is 0600. Also captured by backup-mercury-state.sh (two-layer recovery)."

  # ── opencode ───────────────────────────────────────────────────────────
  - id: opencode-auth
    purpose: opencode provider API keys (Anthropic, OpenAI, Google, etc.)
    location: ~/.local/share/opencode/auth.json
    rotation: |
      # Edit the JSON file. opencode reads on next launch.
    note: "JSON format, one entry per provider."

  # ── openwiki (LangChain repo-documentation agent) ──────────────────────
  # Minimax coding-plan API key, served to openwiki via the Anthropic-compatible
  # surface at https://platform.minimax.io (per openwiki README + MiniMax docs).
  # OpenWiki persists this to ~/.openwiki/.env on first run. The audit checks
  # PRESENCE only — never the value — and reports drift in scripts/audit.sh [openwiki].
  # See tooling/openwiki/README.md for the full setup flow.
  - id: openwiki-api-key
    purpose: |
      Minimax coding-plan API key for openwiki (Anthropic-compatible
      surface: https://platform.minimax.io/, model MiniMax-M3).
    location: ~/.openwiki/.env
    location_mode: 0600 ubuntu:ubuntu
    rotation: |
      # Edit ~/.openwiki/.env and set ANTHROPIC_API_KEY=<new key>.
      # The file is created (and key prompted for) by `openwiki --init`;
      # you can also hand-edit it after the first run.
      # Endpoint stays at https://platform.minimax.io/ (NOT api.minimax.io —
      # that mirror is the OpenAI-compatible surface at /v1, used by Hermes
      # for fallback, not by openwiki).
    rotation_caveat: |
      Rotating this invalidates openwiki runs until the new key is also
      refreshed into the agent's `~/.openwiki/.env` and any openwiki
      GitHub Actions secrets on per-repo workflows. No service restart
      needed — openwiki reads the .env on every run.
    note: |
      Deployment keychain lives at `~/.openwiki/.env` (mode 0600) — NOT
      in `~/.hermes/.env`, because openwiki is an independent CLI, not
      a Hermes-config provider. `backup-secrets.sh` should be
      extended to capture this file (see TODO in the PR body); until
      that lands, the user must run `bash scripts/backup-secrets.sh
      --include openwiki` manually after `--init`.
      recoverability: RECOVERABLE (regenerate from the minimax coding
      plan portal; openwiki's `~/.openwiki/.env` rewrites on `--init`).

  # ── gogcli (Gmail CLI) ─────────────────────────────────────────────────
  - id: gogcli-credentials
    purpose: Gmail OAuth client credentials + encrypted keyring
    location: ~/.config/gogcli/credentials.json
    rotation: |
      # Re-authorize via `gog auth` flow; credentials.json is rewritten.
    note: |
      # Backup captures both `credentials.json` AND `~/.config/gogcli/keyring/`
      # (the encrypted keyring tar.gz'd as `gogcli_keyring_tar_gz` in the secrets YAML).

  # ── OpenViking (added 2026-07-19, OpenRouter migration 2026-07-24) ────────
  # Migration history:
  #   2026-07-19 — initial integration (MiniMax direct, inline key in ov.conf).
  #   2026-07-24 — moved embedding + VLM to OpenRouter (Qwen3-Embedding 8B
  #                 + Qwen3.5-Flash) via env-var substitution. The MiniMax
  #                 provider block is GONE from ov.conf; this deprecated
  #                 entry is kept for rollback only (one-line ov.conf edit).
  - id: openviking-minimax-api-key
    deprecated: true              # do not use for new installs; kept for rollback
    purpose: |
      MiniMax API key — DEPRECATED 2026-07-24. OpenViking no longer reads
      this key (ov.conf is now OpenRouter-anchored). Kept for 7 days
      minimum so a one-line `ov.conf` flip can roll back to the
      MiniMax provider block. The same MiniMax key is also reused for
      Hermes gateway + openwiki + opencode + faster-whisper + goose;
      those subsystems continue to use it.
    location: ~/.openviking/.minimax-key
    location_mode: "0600 ubuntu:ubuntu"
    rotation: |
      For Hermes/openwiki/opencode/etc. rotation, see the relevant entry
      in this file. For OpenViking rollback, see scripts/restore.sh on a
      fresh host.
    note: |
      The .minimax-key file is captured by backup-secrets.sh as
      `openviking_minimax_api_key` for as long as the file exists on
      the host. The Hermes gateway's MINIMAX_API_KEY in ~/.hermes/.env
      is the live source for all other MiniMax-direct subsystems.

  - id: openviking-openrouter-api-key
    purpose: |
      OpenRouter API key used by OpenViking for embedding
      (qwen/qwen3-embedding-8b, 4096-dim) and VLM (qwen/qwen3.5-flash-02-23).
      Sourced from OPENROUTER_API_KEY in ~/.hermes/.env; ov.conf uses
      ${OPENROUTER_API_KEY} env-var substitution (no inline key in the
      config file).
    location: ~/.hermes/.env   # line: OPENROUTER_API_KEY=...
    location_mode: "0600 ubuntu:ubuntu"
    rotation: |
      # Regenerate at https://openrouter.ai/settings/keys.
      # Update ~/.hermes/.env OPENROUTER_API_KEY=<new-key> line (the rest of
      # the file is preserved by scripts/restore-secrets.sh if the line is
      # present; otherwise the restore path appends).
      # OpenViking hot-reloads ov.conf on read; a server restart is not
      # required for this key change.
    note: |
      Captured by backup-secrets.sh as `openviking_openrouter_api_key` (a
      base64'd scalar sourced from OPENROUTER_API_KEY in ~/.hermes/.env).
      Restored by scripts/restore-secrets.sh --include openviking, which
      writes OPENROUTER_API_KEY=<value> back to ~/.hermes/.env (appending
      if the line is missing, preserving other entries).
      The same key may also be shared by other Hermes providers (tavily,
      web search/exact, future LLM routes); rotating requires updating
      every consumer that imports the var. Currently only OpenViking
      consumes it from ov.conf, but other consumers will follow.

  # ── OpenViking config file (added 2026-07-19) ────────────────────────────
  # Contains the OpenRouter API key as env-var substitution. OpenViking's
  # ov.conf schema DOES support env-var substitution in api_key fields
  # (verified 2026-07-24 with ${OPENROUTER_API_KEY} on openviking 0.4.10).
  # This is captured for parity with the key files and gives fresh hosts
  # a recoverable ov.conf.
  - id: openviking-ov-conf
    purpose: OpenViking server config — uses ${OPENROUTER_API_KEY} env-var substitution
    location: ~/.openviking/ov.conf
    location_mode: "0600 ubuntu:ubuntu"
    rotation: "Edit file directly; restart openviking-server to pick up changes (hot-reload usually sufficient)."
    note: |
      File permission is 0600. Backup captures this as openviking_ov_conf
      in the secrets YAML. The current config uses provider=openai for
      both embedding and VLM, with api_base=https://openrouter.ai/api/v1
      and api_key="${OPENROUTER_API_KEY}".

  # ── Varlock pass store (added 2026-07-20, Varlock plan Stage 3) ──────────
  # The GPG-encrypted tree under ~/.password-store/ holds all pass-managed
  # secrets (the `pass insert mercury/<repo>/<KEY>` schema names live here).
  # Backup captures the entire tree as a single tar.gz so it round-trips
  # byte-identically through restore. Mode 700 dir + 600 files inside the
  # tar are preserved by tar -p.
  - id: varlock-pass-store
    purpose: |
      GPG-encrypted pass store under ~/.password-store/. Owns all
      `mercury/<repo>/<KEY>` entries consumed by varlock load + varlock run
      during project startup (replaces the per-project plaintext .env files
      once Varlock migration completes).
    location: ~/.password-store/
    location_mode: "0700 dir ubuntu:ubuntu, 0600 files inside"
    rotation: |
      # Per-entry rotation: `pass insert -f mercury/<repo>/<KEY>` in a TTY
      # (interactive pass insert works in Termux/headless; the -f flag has a
      # stdin-pipe bug in Ubuntu Noble pass 1.7.4-6 — see skill
      # devops/gpg-pass-store-bootstrap-on-headless-terminal pitfall #2).
      # Then re-run backup-secrets.sh --force to refresh this YAML.
    note: |
      Captured by backup-secrets.sh as `varlock_pass_store_tar_gz` — a
      single base64'd tar.gz of the entire ~/.password-store/ tree.
      Restore one with:
        bash scripts/restore-secrets.sh --include varlock-pass
      The .gpg-id file (the fingerprint of the GPG identity that encrypts
      the store) lives inside the tar and is restored alongside.

  # ── Varlock GPG private key (added 2026-07-20, Varlock plan Stage 3) ──────
  # The private key for the GPG identity that encrypts the pass store above.
  # Lives under ~/.gnupg/private-keys-v1.d/<keygrip>.key as mode 600 (single
  # binary file, NOT armored). Restoring this on a fresh host is what makes
  # the pass store usable — without the key, the store ciphertext is
  # unrecoverable. The off-host encrypted bundle at
  # `mercury-recovery-*.asc.gpg` is the durable copy; this backup is a
  # second-line safety net.
  - id: varlock-gpg-private
    purpose: |
      GPG private key (mode 600 binary blob under ~/.gnupg/private-keys-v1.d/
      OR armored export in varlock_gpg_armored_private block) that decrypts
      every entry in the Varlock pass store. Restoring this on a fresh host
      is what makes `pass show mercury/<repo>/<KEY>` work.
    location: ~/.gnupg/private-keys-v1.d/  (binary .key files, opportunistic)
               + ~/.gnupg/<gpg --export-secret-keys>  (armored export, durable)
    location_mode: "0700 dir ubuntu:ubuntu, 0600 files inside"
    rotation: |
      # Key rotation = generate a new key (gpg --quick-generate-key), init
      # a new pass store against it, migrate entries, then re-run backup.
      # The recovery-bundle export flow (gpg --export-secret-keys --armor
      # + gpg --symmetric) is the durable copy; this backup is a redundant
      # second layer for restore-from-this-host scenarios.
    note: |
      Captured by backup-secrets.sh in TWO blocks:
        * varlock_gpg_armored_private — the durable copy. Single-file
          armored export of the GPG private key (~3-5 KB). Always emitted
          when Stage 2 has run. Restored via `gpg --import`.
        * varlock_gpg_private_tar_gz — tar.gz of ~/.gnupg/private-keys-v1.d/
          (mode-700 dir + mode-600 files). Opportunistic: on GnuPG 2.4.4
          the .key files are written LAZILY by the agent on first
          private-key access, so a freshly-bootstrapped host may have an
          empty tar here. The armored block above is the durable path.
      The public-key ring (~/.gnupg/pubring.kbx + trustdb.gpg) is already
      covered by /home/ubuntu/.gnupg in BACKUP_PATHS (backup-mercury-state.sh).
      The off-host recovery bundle (mercury-recovery-*.asc.gpg + symmetric
      passphrase in a separate place) is the third layer. Losing all three
      = total secret loss.

  # Removed 2026-07-05 (PR #28) — services were decommissioned in PR #24
  # but the inventory entries lingered. On-disk configs were deleted in the
  # same PR; the latest state tarball retains them for cold-recovery:
  #   - id: webhook-server-secret       (was HMAC secret for inbound webhooks)
  #   - id: webhook-server-projects     (was routing config)
  #   - id: discord-notify-config       (was per-project HMAC + chat IDs)

rotation_policy:
  ssh: "Every 12 months or on staff change"
  github_pat: "Every 6 months or on suspected leak"
  oauth2_cookie_secret: "Only on suspected compromise (logging everyone out is expensive)"
  letsencrypt: "Certbot handles automatically (60-day certs, 30-day renewal window)"
