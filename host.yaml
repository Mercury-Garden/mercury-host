---
host: mercury
hostname: mercury                  # /etc/hostname
fqdn: mercury                      # local; no public DNS (this is a single Oracle VM)

network:
  internal_ip: 10.0.0.171
  interface: enp0s6
  cidr: 10.0.0.0/24
  vcn: Oracle VCN, default public subnet
  notes: |
    Host has a public IP via Oracle Cloud NAT. Internal IP is on enp0s6.
    TLS termination happens at nginx:443; Letsencrypt cert lives at
    /etc/letsencrypt/live/mercury.garden/ and is renewed by certbot timer.

os:
  pretty_name: "Ubuntu 24.04.4 LTS"
  codename: noble
  arch: aarch64
  kernel: 6.17.0-1018-oracle
  cloud: oracle-ubuntu-24.04

purpose: |
  Mercury Garden single-tenant host. Hosts the public Mercury Garden
  subdomains (mercury.garden + per-service subdomains) and a handful of
  internal services (Hermes gateway, webhook server, oauth2-proxy).

users:
  - name: ubuntu
    home: /home/ubuntu
    shell: /usr/bin/zsh
    sudo: true
    owns: "all services in systemd/user/, all tooling/, all projects/"

oracle_cloud:
  # The full canonical identifiers live in inventory.yaml → state_backup.oci_block_volume.
  # This is a pointer for ops who land on host.yaml first.
  region: us-chicago-1
  availability_domain: gKwy:US-CHICAGO-1-AD-1
  instance_shape: VM.Standard.A1.Flex    # Always Free ARM (4 OCPU, 24 GB)
  block_volumes:
    - name: boot
      device: /dev/sda
      size_gb: 47
      snapshots: false                     # intentionally not backed up; see inventory.yaml
    - name: data
      device: /dev/sdb
      mount: /home/ubuntu/data
      size_gb: 50
      snapshots: monthly, retained 90 days
  free_tier:
    arm_instances: 1 of 4 used
    block_volume_backups: 1 of 5 used
