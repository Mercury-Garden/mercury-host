---
# Node.js toolchain state for mercury.
# Regenerate with: scripts/capture.sh
# DO NOT track: ~/.volta/tools/image/node/*  (rebuilt by `volta install`)
# DO NOT track: */node_modules                (rebuilt by `pnpm install --frozen-lockfile`)

node_managers:
  volta:
    install_method: https://volta.sh
    cli_version: 2.0.2
    home: ~/.volta
    default_node: 24.18.0
    default_npm: 11.17.0
    default_pnpm: 11.11.0
    cached_runtimes:
      - 24.14.1   # stale; not in current volta cache
      - 24.16.0   # stale; not in current volta cache
      - 24.18.0   # stale; not in current volta cache
    globally_pinned_packages:
      - name: "@colbymchenry/codegraph"
        version: 1.4.1
        node: 24.18.0
      - name: "@fission-ai/openspec"
        version: 1.6.0
        node: 24.18.0
      - name: "@plannotator/opencode"
        version: 0.23.0
        node: 24.18.0
      - name: context-mode
        version: 1.0.169
        node: 24.18.0
      - name: opencode-ai
        version: 1.17.18
        node: 24.18.0
      - name: openwiki
        version: 0.0.3
        node: 24.18.0
      - name: pnpm
        version: 11.11.0
        node: 24.18.0

  hermes_bundled:
    home: ~/.hermes/node
    node: 22.23.0
    npm: 10.9.8
    pnpm: null
    purpose: "Hermes gateway runtime; not user-managed (installed by Hermes installer)"

system_node:
  present: false
  path: /usr/bin/node
  note: "No system node. All node access goes through volta (general) or hermes/node (gateway)."

path_order_required:
  # Actual order from interactive `zsh -i -c 'echo $PATH'` on mercury as
  # of 2026-07-07 (verified after the audit surfaced this drift).
  # .zshenv (sourced before .zshrc) prepends $VOLTA_HOME/bin and .local/bin.
  # .zshrc line ~108 prepends $HOME/data/.mercury/bin.
  # .zshrc line ~115 prepends $PNPM_HOME/bin (intentional — most-recently
  #   installed pnpm wins, and pnpm's bin dir needs to shadow volta's pnpm
  #   shim so version-pinned pnpm from package.json is preferred).
  # Note: pnpm-store prepending is BY DESIGN — without it, the global
  #   volta pnpm (11.10.0) would shadow the project-pinned pnpm (11.9.0)
  #   and break the lockfile_sha256 reproducibility check in audit.sh.
  # After dedup: pnpm-store, volta, .local/bin, .mercury/bin, hermes-venv.
  # Verified 2026-07-07: the audit was correctly catching drift between
  # this inventory and the actual ~/.zshrc; the inventory was the liar.
  - ~/.local/share/pnpm/bin
  - ~/.volta/bin
  - ~/.local/bin
  - ~/data/.mercury/bin
  - ~/.hermes/hermes-agent/venv/bin
  - ~/.hermes/hermes-agent/node_modules/.bin
  - ~/.hermes/node/bin
  - ~/.cargo/bin
  - /usr/local/sbin
  - /usr/local/bin
  - /usr/sbin
  - /usr/bin
  - /sbin
  - /bin
  - /opt/homebrew/bin
  - /opt/homebrew/sbin
