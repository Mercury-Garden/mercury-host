---
# Node.js toolchain state for mercury.
# Regenerate with: scripts/capture.sh
# DO NOT track: ~/.local/share/mise/installs/node/*  (rebuilt by `mise install`)
# DO NOT track: */node_modules                    (rebuilt by `pnpm install --frozen-lockfile`)
#
# Data-volume symlink invariant (verified 2026-07-18):
#   ~/.local/share  → /home/ubuntu/data/.local/share
#   ~/.cache        → /home/ubuntu/data/.cache
# Anything installed under those prefixes lives on the data volume
# (49GB, /dev/sdb1) automatically. The mise installer places its tree
# at ~/.local/share/mise by default; it resolves to the data volume.
# capture.sh's PATH probe must accept both the symlinked path AND the
# resolved /home/ubuntu/data/... path so the audit passes under both
# hermes-gateway's sanitized HOME and an interactive zsh session.

node_managers:
  mise:
    install_method: https://mise.run
    cli_version: 2026.7.7
    home: ~/.local/share/mise       # resolves to /home/ubuntu/data/.local/share/mise via symlink
    binary: ~/.local/bin/mise
    default_node: "24"               # floating within-major; resolves to latest 24.x (audit compares semver-aware)
    default_pnpm: 11.14.0             # mise-managed via `mise use --global pnpm@11.14.0`; resolves via shims dir on PATH
    cached_runtimes:
      - 24.18.0
    migration_note: |
      Replaces the prior `volta` block (unmaintained as of 2025;
      https://github.com/volta-cli/volta/issues/2080 — its maintainers
      recommend mise). cron_preflight_capture refreshes these from
      `mise ls --installed` on every run. Globally pinned tool binaries
      (opencode, etc.) are no longer owned by mise — they live as
      standalone npm installs (see AGENTS.md for the daily upgrade
      procedure).

  hermes_bundled:
    home: ~/.hermes/node
    node: 22.23.0
    npm: 10.9.8
    pnpm: null
    purpose: "Hermes gateway runtime; not user-managed (installed by Hermes installer)"

system_node:
  present: false
  path: /usr/bin/node
  note: "No system node. All node access goes through mise (general) or hermes/node (gateway)."

path_order_required:
  # Post-volta→mise migration (2026-07-18), extended for mise-managed pnpm
  # (2026-07-18, this PR). Verified by the audit `capture.sh` PATH-walk
  # validator. Order rationale (what `eval "$(mise activate zsh)"` actually
  # prepends to PATH, given mise on PATH at startup):
  # - ~/.local/share/mise/installs/pnpm/11.14.0     (mise-managed pnpm bin)
  #                                                 — mise activate prepends
  #                                                 pnpm BEFORE node because
  #                                                 pnpm is configured globally;
  #                                                 node comes second.
  # - ~/.local/share/mise/installs/node/24/bin      (mise node 24.18.0 bin)
  # - ~/.local/bin                                  (mise binary itself)
  # - ~/.cargo/bin                                  (rust; inherited from
  #                                                 ~/.zshenv sourcing
  #                                                 ~/.cargo/env, which prepends
  #                                                 cargo via rustup init —
  #                                                 ~/.zshenv runs BEFORE
  #                                                 ~/.zshrc so cargo is added
  #                                                 before mise activate, and
  #                                                 mise activate prepends ON
  #                                                 TOP of cargo)
  # - system paths unchanged
  # Note: the gateway systemd units deliberately put hermes/node/bin BEFORE
  #       the mise install dirs (PR #70) so the hermes-bundled node wins for
  #       gateway processes — but for interactive shells the mise install
  #       dirs win for any non-rust tool.
  - ~/.local/share/mise/installs/pnpm/11.14.0
  - ~/.local/share/mise/installs/node/24/bin
  - ~/.local/bin
  - ~/.cargo/bin
  - /usr/local/sbin
  - /usr/local/bin
  - /usr/sbin
  - /usr/bin
  - /sbin
  - /bin
  - /opt/homebrew/bin
  - /opt/homebrew/sbin
