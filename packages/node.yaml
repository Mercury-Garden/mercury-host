---
# Node.js toolchain state for mercury.
# Regenerate with: scripts/capture.sh
# DO NOT track: ~/.volta/tools/image/node/*  (rebuilt by `volta install`)
# DO NOT track: */node_modules                (rebuilt by `pnpm install --frozen-lockfile`)

node_managers:
  volta:
    install_method: https://volta.sh
    cli_version: 2.0.2
    home: ~/.volta
    default_node: 24.18.0
    default_npm: 11.17.0
    default_pnpm: 11.9.0
    cached_runtimes:
      - 24.14.1   # stale; kept because volta doesn't auto-prune
      - 24.16.0   # kept for openspec / plannotator / context-mode pins
      - 24.18.0   # default
    globally_pinned_packages:
      - name: "@fission-ai/openspec"
        version: 1.4.1
        node: 24.16.0
      - name: "@plannotator/opencode"
        version: 0.20.1
        node: 24.16.0
      - name: context-mode
        version: 1.0.162
        node: 24.16.0
      - name: opencode-ai
        version: 1.17.11
        node: 24.18.0
      - name: pnpm
        version: 11.9.0
        node: 24.18.0

  hermes_bundled:
    home: ~/.hermes/node
    node: 22.23.0
    npm: 10.9.8
    pnpm: null
    purpose: "Hermes gateway runtime; not user-managed (installed by Hermes installer)"

system_node:
  present: false
  path: /usr/bin/node
  note: "No system node. All node access goes through volta (general) or hermes/node (gateway)."

path_order_required:
  # Exact order from interactive `zsh -i -c 'echo $PATH'` on mercury as of 2026-06-27.
  # ~/.zshrc prepends in this order: OPENFANG bin, volta, then PNPM_HOME (last prepend wins).
  # Result: pnpm/bin ends up first, volta/bin second, hermes paths much later.
  - ~/.local/share/pnpm/bin
  - ~/.volta/bin
  - ~/.local/bin
  - ~/data/.mercury/bin
  - ~/.volta/bin
  - ~/.hermes/hermes-agent/venv/bin
  - ~/.hermes/hermes-agent/node_modules/.bin
  - ~/.hermes/node/bin
  - ~/.local/bin
  - ~/.cargo/bin
  - /usr/local/sbin
  - /usr/local/bin
  - /usr/sbin
  - /usr/bin
  - /sbin
  - /bin
  - /opt/homebrew/bin
  - /opt/homebrew/sbin

projects:
  # All node projects on this host. pin is what capture.sh expects in
  # package.json#volta. drift = any project without a volta pin is reported
  # by audit.sh as REPRODUCIBILITY-RISK.
  - path: ~/data/code/mercury-tasks
    repo: Mercury-Garden/mercury-tasks
    package_manager: pnpm@11.9.0
    pin:
      node: 24.18.0
      pnpm: 11.9.0
    engines_declared: "node >=24"
    volta_pinned: false    # capture.sh will write this true once we commit the volta block

  - path: ~/data/code/better-bet
    repo: Mercury-Garden/better-bet
    package_manager: pnpm@11.9.0
    pin:
      node: 24.18.0
      pnpm: 11.9.0
    volta_pinned: false

  - path: ~/data/code/scriptcaster
    repo: Mercury-Garden/scriptcaster
    package_manager: pnpm@11.9.0
    pin:
      node: 24.18.0
      pnpm: 11.9.0
    engines_declared: "node >=24.0.0"
    volta_pinned: false

  - path: ~/data/code/webhook-server
    repo: Mercury-Garden/webhook-server
    package_manager: pnpm@11.9.0
    pin:
      node: 24.18.0
      pnpm: 11.9.0
    engines_declared: "node >=24.0.0"
    volta_pinned: false

  - path: ~/data/code/x-digest
    repo: Mercury-Garden/x-digest
    package_manager: pnpm@11.9.0
    pin:
      node: 24.18.0
      pnpm: 11.9.0
    engines_declared: "node >=24.0.0"
    volta_pinned: false
