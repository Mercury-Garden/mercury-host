---
# Cargo-installed binaries on mercury (rust toolchain + binaries).
# Regenerate with: `cargo install --list` parsed by scripts/capture.sh.

toolchain:
  rustc: 1.92.0   # via rustup
  cargo: 1.92.0
  installed_via: rustup

# Release-tarball installs (Rust-built binaries, NOT `cargo install --list`).
# Each entry: name, version, source repo, install path, sha256 of the binary.
# These are listed separately because `cargo install --list` does not know
# about them — capture.sh maintains this block from a hand-curated list.
release_tarball_bins:
  - name: obscura
    version: 0.1.9
    repo: h4ckf0r0day/obscura
    install_path: /home/ubuntu/.local/bin/obscura
    binaries:
      - obscura
      - obscura-worker
    install_command: |
      curl -sLO https://github.com/h4ckf0r0day/obscura/releases/download/v0.1.9/obscura-aarch64-linux.tar.gz && \
      tar xzf obscura-aarch64-linux.tar.gz -C /tmp && \
      install -m 0755 /tmp/obscura /tmp/obscura-worker /home/ubuntu/.local/bin/

packages: []
