---
# Cargo-installed binaries on mercury (rust toolchain + binaries).
# Regenerate with: `cargo install --list` parsed by scripts/capture.sh.

toolchain:
  rustc: 1.92.0   # via rustup
  cargo: 1.92.0
  installed_via: rustup

# Release-tarball installs (Rust-built binaries, NOT `cargo install --list`).
# Each entry: name, version, source repo, install path, sha256 of the binary.
# These are listed separately because `cargo install --list` does not know
# about them — capture.sh maintains this block from a hand-curated list.
release_tarball_bins:
  - name: obscura
    version: 0.1.9
    repo: h4ckf0r0day/obscura
    install_path: /home/ubuntu/.local/bin/obscura
    binaries:
      - obscura
      - obscura-worker
    install_command: |
      curl -sLO https://github.com/h4ckf0r0day/obscura/releases/download/v0.1.9/obscura-aarch64-linux.tar.gz && \
      tar xzf obscura-aarch64-linux.tar.gz -C /tmp && \
      install -m 0755 /tmp/obscura /tmp/obscura-worker /home/ubuntu/.local/bin/

  - name: varlock
    version: 1.11.0
    repo: dmno-dev/varlock
    install_path: /home/ubuntu/.local/bin/varlock
    binaries:
      - varlock
      - varlock-local-encrypt
    # Pinned upstream SHA-256 of the published Linux arm64 archive
    # (github.com/dmno-dev/varlock/releases/tag/varlock@1.11.0,
    # checksums.txt). Verified on this host 2026-07-20.
    upstream_archive_sha256: 5b74a89f07ac27ee21e819e5b2aa327792bb3e5676338e62b8ef2f9a120b45bd
    # SHA-256 of the installed binary on this host (regenerated by reinstall).
    installed_binary_sha256: 4448f92626af6197f6b718c3c3d1c3c23d3e90cf87b814042e405c3c227214de
    install_command: |
      set -euo pipefail
      EXPECTED="5b74a89f07ac27ee21e819e5b2aa327792bb3e5676338e62b8ef2f9a120b45bd  varlock-linux-arm64.tar.gz"
      TMP=$(mktemp -d); cd "$TMP"
      curl -fsSL --retry 3 --max-time 60 -o varlock-linux-arm64.tar.gz \
        "https://github.com/dmno-dev/varlock/releases/download/varlock@1.11.0/varlock-linux-arm64.tar.gz"
      echo "$EXPECTED" | sha256sum -c -
      tar -xzf varlock-linux-arm64.tar.gz
      install -m 0755 varlock /home/ubuntu/.local/bin/varlock
      install -m 0755 varlock-local-encrypt /home/ubuntu/.local/bin/varlock-local-encrypt
      cd /; rm -rf "$TMP"
    purpose: |
      Schema + validation + redacted agent mode for the Varlock secrets plan.
      Pin to upstream tarball (NOT npm install — release is a single binary
      with verifiable SHA). Re-verify sha256 against published checksums.txt
      before any version bump. Companion helper `varlock-local-encrypt` is
      installed alongside (used by the local encryption fallback path; not
      the authoritative store on this host).

packages: []
