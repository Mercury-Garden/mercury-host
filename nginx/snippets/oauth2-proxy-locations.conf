# /oauth2/* routed to oauth2-proxy for every protected subdomain.
# Goes inside `server { ... }`. The /oauth2/verify location is what
# auth_request hits — it returns 200 if a valid session cookie is present,
# 401 otherwise.

location = /oauth2/verify {
    internal;                              # only callable via auth_request
    proxy_pass http://127.0.0.1:4180/oauth2/auth;
    proxy_set_header Content-Length "";   # strip, since internal subrequest
    proxy_set_header Host $host;
    proxy_pass_request_body off;
}

# /oauth2/start is the entry point for unauthenticated users.
# oauth2-proxy handles the GitHub redirect itself.
location = /oauth2/start {
    proxy_pass http://127.0.0.1:4180/oauth2/start;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Auth-Request-Redirect $request_uri;
}

# /oauth2/callback is where GitHub sends the user back to. Only the bare
# domain (mercury.garden) needs to host this; subdomains just need a passthrough
# in case GitHub redirects to a subdomain (we configured it on the bare domain,
# but having it everywhere is harmless).
location = /oauth2/callback {
    proxy_pass http://127.0.0.1:4180/oauth2/callback;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Sign-out endpoint.
location = /oauth2/sign_out {
    proxy_pass http://127.0.0.1:4180/oauth2/sign_out;
    proxy_set_header Host $host;
}

# Static assets oauth2-proxy serves (CSS, etc.) for the sign-in page.
location /oauth2/ {
    proxy_pass http://127.0.0.1:4180;
    proxy_set_header Host $host;
}
