# Snippet sourced into every protected subdomain. Goes inside `server { ... }`.
# Tells nginx to ask oauth2-proxy (127.0.0.1:4180) whether the request has a
# valid session. If oauth2-proxy returns 2xx, request proceeds. If 401/403,
# oauth2-proxy handles the redirect to GitHub itself (via the error_page).

# Internal subrequest to oauth2-proxy. The -1 return tells nginx not to
# expose the auth_request response to the client.
auth_request /oauth2/verify;
auth_request_set $auth_user   $upstream_http_x_auth_request_user;
auth_request_set $auth_email  $upstream_http_x_auth_request_email;
auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

# If the auth_request returns 401, hand off to oauth2-proxy which knows
# how to start the OAuth flow and bounce the user to GitHub.
error_page 401 = /oauth2/start?rd=$request_uri;
