---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The `secrets-test` job below is label-gated: it only runs when a PR
# has the `secrets-test` label. Add the label manually when you want CI
# to exercise the auto-discover backup + per-file restore round-trip
# (scripts/test-secrets-backup-restore.sh). The default gate (lint,
# shellcheck, secrets-scan, audit dry-run) stays fast on every PR.

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq yamllint
          yamllint -c .yamllint.yml --strict .

      - name: shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq shellcheck
          shellcheck scripts/*.sh

      - name: secrets-scan (gitleaks)
        run: |
          # Install gitleaks directly. Avoid gitleaks/gitleaks-action@v2 which
          # now requires a paid GITLEAKS_LICENSE secret.
          GL_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --no-git --redact --exit-code 1 .

      - name: audit script dry-run
        run: |
          # Run audit.sh in CI as a smoke test. Drift is expected on the CI runner
          # because no services are running there — we only assert that the script
          # exits without a bash error (not the exit code itself).
          bash scripts/audit.sh || true

  secrets-test:
    # Runs scripts/test-secrets-backup-restore.sh and
    # scripts/test-capture-path-trap.sh — the round-trip harnesses for
    # auto-discovered secret backup/restore (PR #31) and the capture.sh
    # PATH-trap fix (PR #56, fix/capture-path-trap). Label-gated so they
    # don't run on every PR. Both harnesses are hermetic (synthetic $HOME
    # under mktemp -d, no real secrets) so they're safe to run anywhere.
    runs-on: ubuntu-24.04
    if: contains(github.event.pull_request.labels.*.name, 'secrets-test')
    steps:
      - uses: actions/checkout@v4

      - name: install shellcheck (required by the test harness indirectly)
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq shellcheck

      - name: run secrets backup/restore round-trip test
        run: |
          bash scripts/test-secrets-backup-restore.sh --verbose

      - name: run capture.sh PATH-trap regression test
        run: |
          bash scripts/test-capture-path-trap.sh --verbose
