---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq yamllint
          yamllint -c .yamllint.yml --strict .

      - name: shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq shellcheck
          shellcheck scripts/*.sh

      - name: secrets-scan (gitleaks)
        run: |
          # Install gitleaks directly. Avoid gitleaks/gitleaks-action@v2 which
          # now requires a paid GITLEAKS_LICENSE secret.
          GL_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --no-git --redact --exit-code 1 .

      - name: audit script dry-run
        run: |
          # Run audit.sh in CI as a smoke test. Drift is expected on the CI runner
          # because no services are running there — we only assert that the script
          # exits without a bash error (not the exit code itself).
          bash scripts/audit.sh || true
