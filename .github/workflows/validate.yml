---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: pipedash-inc/yamllint-action@v1
        with:
          config_file: .yamllint.yml
          strict: true

      - name: shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq shellcheck
          shellcheck scripts/*.sh

      - name: secrets-scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: audit script dry-run
        run: |
          # Run audit.sh in CI as a smoke test. Drift is expected on the CI runner
          # because no services are running there — we only assert that the script
          # exits without a bash error (not the exit code itself).
          bash scripts/audit.sh || true
