---
extends: default
rules:
  line-length:
    max: 160
    level: warning
  document-start:
    present: true
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  comments-indentation: enable
  indentation:
    indent-sequences: consistent

# Ignore upstream-owned files that use YAML-as-JSON syntax (not standard YAML)
# and shouldn't be reformatted by yamllint --fix.
ignore: |
  tooling/goose/config.yaml
