  - path: ~/data/code/scriptcaster
    repo: Mercury-Garden/scriptcaster
    package_manager: pnpm@11.9.0
    pinned_node: 24.18.0
    expected_branch: main
    lockfile_sha256: ef187c911bcc    # capture.sh: refreshed scriptcaster
