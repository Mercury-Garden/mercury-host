# ── OpenWiki (LangChain repo-documentation agent) ───────────────────────
# OpenWiki is a CLI that generates and maintains a Markdown wiki for a
# codebase and patches AGENTS.md / CLAUDE.md to point at that wiki. On
# mercury it runs as a globally-installed npm tool, installed via
# `npm install -g openwiki` against the mise-managed Node 24.x prefix
# (the package itself is tracked and daily-upgraded by
# scripts/devtools-upgrade.ts; see its STANDALONE_NPM_CLIS list).
# It is configured to talk to the minimax coding-plan endpoint via
# the Anthropic-compatible surface at https://platform.minimax.io/
# (NOT api.minimax.io — that mirror is the OpenAI-compatible surface at
# /v1 used by Hermes fallback).
#
# Historical note: openwiki was originally installed on 2026-07-08 via
# `volta install openwiki`. On 2026-07-18 the host migrated from volta
# to mise (PRs #67 + #72 + #55). openwiki was re-installed as a
# standalone npm CLI (no longer declared in any volta-style manifest;
# capture.sh no longer enumerates it). The current install path is the
# mise-managed Node 24.x lib/node_modules/openwiki.
#
# The audit's [openwiki] section (added in the install PR) verifies:
#  1. The openwiki CLI is on PATH (binary path tracked in
#     scripts/devtools-upgrade.ts locateInstalledVersion).
#  2. The expected provider / model / base_url are present in
#     ~/.openwiki/.env (presence-only checks, NEVER the key value).
#  3. ~.openwiki/.env has mode 0600.
#
# `keys_present:` is a PRESENCE check; the real key lives in
# ~/.openwiki/.env (mode 0600) and is captured by `backup-secrets.sh`
# (TODO: extend that script to include ~/.openwiki/.env — flagged in
# the PR body).
openwiki:
  binary:
    expected_on_path: openwiki
    installed_via: "npm install -g openwiki"   # against the mise-managed Node 24.x prefix
    pinned_to_node: "24"               # floating; matches the global mise toolchain pin
    refresh: scripts/devtools-upgrade.ts (cron-managed daily upgrade)
  provider: anthropic              # matches OPENWIKI_PROVIDER in ~/.openwiki/.env
  base_url: https://api.minimax.io/anthropic   # matches ANTHROPIC_BASE_URL in ~/.openwiki/.env
  model: MiniMax-M2.7-highspeed    # matches OPENWIKI_MODEL_ID in ~/.openwiki/.env
  config_file: ~/.openwiki/.env
  config_file_mode: 600            # no leading zero in bash array (see audit.sh pitfall)
  env_keys_required:
    - OPENWIKI_PROVIDER
    - ANTHROPIC_API_KEY            # presence-only; never print the value
    - ANTHROPIC_BASE_URL
    - OPENWIKI_MODEL_ID
  workflow_file: |
    Per-repo: copy https://github.com/langchain-ai/openwiki/blob/main/examples/openwiki-update.yml
    into <repo>/.github/workflows/openwiki-update.yml. Runs `openwiki --update`
    daily; produces a PR against the repo with doc refreshes.
  note: |
    Install: `npm install -g openwiki` against the mise-managed Node 24.x
    prefix (originally installed 2026-07-08 via `volta install openwiki`;
    re-installed as a standalone npm CLI on 2026-07-18 during the volta→mise
    migration).
    First-run setup: `openwiki --init` (interactive — provider, key,
    model). Until the user completes --init, audit reports drift on
    `~/.openwiki/.env` (expected — that's by design here per your
    "install everything EXCEPT the key" choice).
    Source of truth for the binary → scripts/devtools-upgrade.ts cron
    (STANDALONE_NPM_CLIS list; daily upgrade via `npm install -g openwiki`).
    Source of truth for the API key → ~/.openwiki/.env (pointed at by
    secrets/inventory.yaml → openwiki-api-key).
    See tooling/openwiki/README.md for the full setup flow + recovery.
