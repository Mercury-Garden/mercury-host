---
# Single source of truth for everything this host owns.
# Regenerate with: scripts/capture.sh
# Audit with:       scripts/audit.sh

version: 1

services:
  - id: hermes-gateway
    kind: systemd-user
    unit: systemd/user/hermes-gateway.service
    binds:
      - 127.0.0.1:9090
    description: "Hermes Agent gateway (main thread)"
    repo: "local install via Hermes installer"
    managed_by: human+mercutio
    stt_backend:
      provider: local
      package: faster-whisper   # in ~/.hermes/hermes-agent/venv
      model: small              # 464 MB, Systran/faster-whisper-small
      language_pin: es          # skips auto-detect on inbound voice
      ffmpeg_required: true     # already in packages/apt.list
      declarative_record: tooling/faster-whisper/README.md

  # ── mercury-butler profile gateway (second Discord app) ──────────────────
  - id: hermes-gateway-mercury-butler
    kind: systemd-user
    unit: systemd/user/hermes-gateway-mercury-butler.service
    binds: []
    description: "Hermes Agent gateway for the mercury-butler profile (Discord app 1491578957823344782; Node.js OSS reporting + health advisor)"
    repo: "local install via Hermes installer"
    managed_by: human+mercutio
    notes:
      discord_app_id: "1491578957823344782"
      purpose: |
        Owns Node.js OSS reporting (nodejs/node + edsadr/node) and personal
        health advisor. Default profile continues to own better-bet,
        mercury-tasks, webhook-server, x-digest, mercury-host, and other
        own repos.
      scopes_needed: "bot + Send Messages + Read Message History + Embed Links"
      profile_dir: "~/.hermes/profiles/mercury-butler (not tracked; lives under HERMES_HOME)"

  - id: hermes-dashboard
    kind: systemd-system
    unit: systemd/system/hermes-dashboard.service
    binds: []
    description: "Hermes dashboard (system-level). Custom local override — ExecStart runs the hermes-agent venv's `hermes_cli.main dashboard`."
    repo: "local install via Hermes installer"
    managed_by: human+mercutio
    note: |
      Source-controlled in mercury-host (this repo) — symlinked from
      /etc/systemd/system/hermes-dashboard.service. Not an apt package; the
      previous /lib/systemd/system/... path in inventory was a stale comment.

  - id: mercury-tasks
    kind: systemd-user
    unit: systemd/user/mercury-tasks.service
    binds:
      - 127.0.0.1:7747
    nginx_vhost: tasks.mercury.garden
    description: "Tasks management API + SPA"
    repo: Mercury-Garden/mercury-tasks
    managed_by: human+mercutio

  - id: oauth2-proxy
    kind: systemd-user
    unit: systemd/user/oauth2-proxy.service
    binds:
      - 127.0.0.1:4180
    description: "GitHub OAuth2 in front of every subdomain"
    config: tooling/oauth2-proxy/oauth2-proxy.cfg.example
    managed_by: human+mercutio

  - id: openchamber
    kind: systemd-user
    unit: systemd/user/openchamber.service
    binds:
      - 127.0.0.1:9090
    nginx_vhost: chamber.mercury.garden
    description: "chamber.mercury.garden SPA backend (was :3939, migrated to :9090 — nginx upstream updated to match)"
    repo: local
    managed_by: human+mercutio

  - id: obscura-mcp
    kind: systemd-user
    unit: systemd/user/obscura-mcp.service
    binds:
      - 127.0.0.1:3000
    description: "Obscura Rust headless browser, MCP server mode. Provides mcp_obscura_* tools to Hermes."
    repo: h4ckf0r0day/obscura   # release-tarball install (recoverable; rebuild via docs)
    managed_by: mercutio

  - id: session-migration
    kind: systemd-user
    unit: /usr/lib/systemd/user/session-migration.service   # Ubuntu package, do not own
    binds: []
    description: "Migrate session data on Hermes startup"
    repo: local
    managed_by: human+mercutio

  - id: nginx
    kind: systemd-system
    unit: /lib/systemd/system/nginx.service   # Ubuntu package, do not own
    binds:
      - 0.0.0.0:80
      - 0.0.0.0:443
    description: "Reverse proxy + TLS termination for all subdomains"
    vhosts_dir: nginx/sites-available
    enabled_vhosts:
      - mercury.garden
      - tasks.mercury.garden
      - chamber.mercury.garden
      - dev.mercury.garden
      - plans.mercury.garden
      - webhook.mercury.garden
    # NOTE: hermes.mercury.garden exists in sites-available but is NOT symlinked
    # into sites-enabled (file present at 644, no symlink). Remove from inventory
    # when fully decommissioned or re-enable by symlinking.
    decommissioned_vhosts:
      - hermes.mercury.garden

  - id: ollama
    kind: systemd-system
    unit: systemd/system/ollama.service
    binds:
      - 127.0.0.1:11434
    description: "Local LLM runtime (fallback provider). Mercury-hardened custom override (LimitNOFILE=102400, ProtectSystem=full, NoNewPrivileges=true)."
    note: |
      Source-controlled in mercury-host (this repo) — symlinked from
      /etc/systemd/system/ollama.service. The binary at /usr/local/bin/ollama
      is installed via the official ollama install script (NOT apt), so this
      unit is not provided by any package and we fully own it.

  - id: cron
    kind: systemd-system
    unit: /lib/systemd/system/cron.service     # Ubuntu package, do not own
    description: "OS-level cron (only system tasks; user crontab is empty)"

cron:
  system_cron_d:
    - /etc/cron.d/certbot
    - /etc/cron.d/e2scrub_all
    - /etc/cron.d/sysstat
  user_crontab: null
  hermes:
    jobs_file: ~/.hermes/cron/jobs.json
    jobs:
      - id: 59b7302d21b7
        name: x-digest-daily
        schedule: "0 14 * * 1-5"
      - id: b5586aeda0f3
        name: better-bet-knockout-daily-update
        schedule: "30 12 * * *"
      - id: 98b672bf950a
        name: devtools-upgrade
        schedule: "0 11 * * *"
      - id: f9c44d64925e
        name: gateway-health-check
        # Watchdog for the Hermes gateway on :8644. no_agent cron that runs
        # ~/.hermes/scripts/gateway-health-check.sh every 5 min; silent on
        # health, posts Discord alert to home channel on failure. See
        # webhook-server#22 for the script.
        schedule: "*/5 * * * *"
      - id: 48b028f7098a
        name: secrets-test-smoke
        # Weekly smoke of the backup/restore round-trip harness.
        # no_agent cron running ~/.hermes/scripts/secrets-test-smoke.sh
        # -> scripts/test-secrets-backup-restore.sh (34 assertions).
        # Sun 04:00 Bogota = 09:00 UTC. Silent on success, Discord
        # home-channel alert on failure. Registered by
        # scripts/register-secrets-test-cron.sh (#37).
        schedule: "0 9 * * 0"
  # Per-profile cron jobs (one block per Hermes profile). Each block lists
  # the jobs in that profile's ~/.hermes/profiles/<name>/cron/jobs.json so
  # `audit.sh` can verify drift between the manifest and reality. Profiles
  # are enumerated statically (not auto-discovered) to keep the manifest
  # authoritative — if you add a profile, add a block here.
  hermes_profiles:
    - profile: mercury-butler
      jobs_file: ~/.hermes/profiles/mercury-butler/cron/jobs.json
      jobs:
        - id: 2a3ef8c2da41
          name: node-clone-refresh
          schedule: "0 8 * * *"
        - id: e727bea3be59
          name: health-morning
          schedule: "0 8 * * *"
        - id: 0d04b6961c88
          name: node-core-daily
          schedule: "0 15 * * *"
        - id: aee156dfb5ec
          name: health-evening
          schedule: "0 22 * * *"
        - id: f63caaebc781
          name: email-classify-and-publish
          schedule: "30 14 * * 1-5"
        - id: b4d65d7dbffe
          name: codegraph-nightly-sync
          # Nightly sync-and-index of the edsadr/node fork against
          # nodejs/node (runs the pr-reviewer/tools/sync_and_index script
          # and reports). local delivery only (writes to log) — no Discord
          # post.
          schedule: "30 6 * * *"
  system_timers:
    - certbot.timer
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - fwupd-refresh.timer

state_backup:
  # Local tarball of host config + data that we can't recover from elsewhere
  # (hermes state, opencode sessions, .config, /etc, mercury-host repo, etc.).
  # Two layers:
  #   1. Local zstd-compressed tarballs in /home/ubuntu/data/backups/ (fast restore)
  #   2. OCI Block Volume monthly snapshot of /dev/sdb (DR — survives VM death)
  #
  # The service + timer unit files intentionally live in `systemd/system/`
  # (NOT `systemd/user/`) because:
  #   1. The service pins `Environment="HOME=/home/ubuntu"` and uses
  #      `StandardOutput=journal` — both awkward under the user manager.
  #   2. The timer fires at 03:00 Bogota, before any user session may be
  #      active. A user-manager timer can be skipped across logouts.
  #   3. The script under `set -u` reads `$HOME` for its XDG_STATE_HOME
  #      default; the system manager would resolve `$HOME` to `/`.
  # Moving the units to `systemd/user/` would silently regress all three.
  # `scripts/restore.sh` special-cases this dir: it symlinks every
  # `systemd/system/*.{service,timer}` into `~/.config/systemd/user/` and
  # enables them there. `scripts/audit.sh` checks the resulting timer
  # state and fails loudly if it disappears again.
  #
  # The script does TWO tar passes and `tar --concatenate`s them before
  # zstd compression. Pass 1 runs as $USER over BACKUP_PATHS (everything
  # under /home/ubuntu and read-friendly /etc paths). Pass 2 runs as root
  # via `sudo -n tar` over ELEVATED_PATHS (/etc/nginx, /etc/letsencrypt)
  # to capture the mode-0600 vhost configs and letsencrypt cert keys.
  # The ACME account private key is explicitly excluded — it can be
  # regenerated by `certbot register --replace` and adds no DR value.
  # Requires ubuntu to have NOPASSWD sudo (true on this host).
  script: scripts/backup-mercury-state.sh
  service: mercury-state-backup.service
  timer: mercury-state-backup.timer
  schedule: "*-*-* 03:00:00 America/Bogota"   # 03:00 Bogota = 08:00 UTC
  location: /home/ubuntu/data/backups/
  retention_count: 7                         # keep last 7 tarballs (1 week of dailies)
  compression: zstd -9
  max_age_hours: 36                          # audit flags if no fresh backup >36h
  last_run_at: "2026-07-09T17:08:11Z"
  last_size_mb: 682
  last_file_count: 26580
  last_sha256: "44a034b6e2d1c037ab0334a1d3f79ebbe09bad0eb6a56f5501a8b8e79b8901c7"
  last_verify_ok: "5/5"
  last_verify_at: "2026-07-09T17:08:51Z"
  tarballs_on_disk: 6
  oci_block_volume:
    # Oracle Cloud Block Volume snapshot of /dev/sdb. Configured once via
    # `oci bv volume-backup-policy assign` from a laptop with OCI CLI; runs
    # automatically on Oracle's infra thereafter. Documented here so
    # `audit.sh` and DR runbooks have a single source of truth for these
    # identifiers — if anything changes (volume recreated, region migrated,
    # AD swapped), update this block and the docs.
    region: us-chicago-1
    availability_domain: gKwy:US-CHICAGO-1-AD-1
    compartment_id: ocid1.tenancy.oc1..aaaaaaaamwf47b2mqs2uqs3mina7kqvexqhxzzov6ocgmgbm5pxyi5mn65pq
    volume_id: ocid1.volume.oc1.us-chicago-1.abxxeljthy26gscgtw3evixaosbfvofmkh52y364u2kz5zmbvxyzvriobulq
    policy_id: ocid1.volumebackuppolicy.oc1.us-chicago-1.amaaaaaatfnkbfyau77livmfn4ljv7ncn45uiyjypuo5vs5lqvouibada7ja
    first_manual_backup_id: ocid1.volumebackup.oc1.us-chicago-1.abxxeljtexdatkoqf4guce6h3nmj75klg7obtit6ydztpccb4intbry3zidq
    first_manual_backup_created: "2026-06-30T19:13:40Z"
    schedule: monthly, 1st of month at 03:00 UTC, retained 90 days
    free_tier_slots_used: 1   # Always Free = 5 total (boot + data combined)
    note: |
      To restore: `oci bv volume create --availability-domain gKwy:US-CHICAGO-1-AD-1
      --region us-chicago-1 --compartment-id <tenancy-ocid>
      --source-volume-backup-id <backup-ocid>` then attach via
      `oci compute volume-attachment create`. See README §"Oracle Cloud
      Block Volume backup" for the full recipe.

node_managers:
  volta:
    install_method: https://volta.sh
    cli_version: 2.0.2
    home: ~/.volta
    default_node: 24.18.0
    default_npm: 11.17.0
    default_pnpm: 11.9.0

  hermes_bundled:
    home: ~/.hermes/node
    node: 22.23.0
    npm: 10.9.8
    pnpm: null
    purpose: "Hermes gateway runtime; not user-managed"

# ── Web search backends (Hermes web_search / web_extract) ───────────────
# Hermes enforces a strict split: backend CHOICE lives in
# ~/.hermes/config.yaml (or per-profile ~/.hermes/profiles/<name>/config.yaml),
# the API KEYS live in ~/.hermes/.env (or per-profile .env files).
# The 8 shipped plugins live under ~/.hermes/hermes-agent/plugins/web/.
# See skills/devops/web-search-backends/SKILL.md for the full picture.
# Only one backend can be active at a time per capability; no auto-rotation.
web_search:
  backend: tavily          # matches ~/.hermes/config.yaml web.backend
  search_backend: tavily
  extract_backend: tavily
  free_tier_rotation:
    - tavily              # 1k calls/mo, primary
    - brave-free          # 2k calls/mo, when tavily exhausts (no extract — pair with firecrawl)
    - ddgs                # no key needed, last-resort search only
  keys_present_in_default_profile:
    - TAVILY_API_KEY
    - FIRECRAWL_API_KEY
    - EXA_API_KEY
    - PARALLEL_API_KEY
  keys_present_in_mercury_butler_profile:
    - TAVILY_API_KEY
    - FIRECRAWL_API_KEY
    - EXA_API_KEY
    - PARALLEL_API_KEY
  note: |
    backup-secrets.sh already captures both hermes_env and
    hermes_profile_mercury-butler_env as b64 blocks; the audit only
    checks presence of the 4 keys, not their values. mercury-butler
    profile's config.yaml currently has web.* = "" (keys available,
    backend not yet activated there).

# ── Hermes per-profile irreplaceable paths ────────────────────────────────
# Files under ~/.hermes/profiles/<name>/ that are critical to recover the
# profile's identity and runtime state. The whole `~/.hermes` directory is
# already captured by `backup-mercury-state.sh` (the daily state tarball),
# but inventory.yaml does not enumerate these by name — meaning a fresh
# host restored from the state tarball has no verification surface for
# "is the mercury-butler profile intact?". This block enumerates the
# critical files so audit.sh can sanity-check presence + mode 0600 on
# every profile, mirroring the project_env check.
# To add a new profile, add a block here with the same shape; capture.sh
# reads from this and emits per-file ok/drift lines into the audit.
hermes_profiles_irreplaceable:
  - profile: mercury-butler
    home: ~/.hermes/profiles/mercury-butler
    files:
      - path: state.db                 # full session history
        mode: 600
        backup_covered_by: backup-mercury-state.sh (full ~/.hermes tarball)
      - path: SOUL.md                  # agent system prompt
        mode: 600
        backup_covered_by: backup-mercury-state.sh
      - path: auth.json                # per-profile provider API keys
        mode: 600
        backup_covered_by: backup-secrets.sh (hermes_profile_mercury-butler_env block) + backup-mercury-state.sh
      - path: channel_directory.json   # Discord channel / thread routing
        mode: 600
        backup_covered_by: backup-mercury-state.sh
      - path: config.yaml              # per-profile runtime config
        mode: 600
        backup_covered_by: backup-mercury-state.sh
      - path: .env                     # per-profile secrets
        mode: 600
        backup_covered_by: backup-secrets.sh (hermes_profile_mercury-butler_env block)

# ── User cache directories relocated to /dev/sdb (2026-07-05) ─────────
# ~/.cache (~3.5G) and ~/.local/share (~1.4G) were relocated from the
# boot volume (sda) to /home/ubuntu/data on /dev/sdb to stop the boot
# disk from filling up. Cache VALUE is preserved — every tool (pnpm,
# uv, playwright, opencode, huggingface, ms-playwright, etc.) resolves
# the same data via the symlink. After the move, future cache growth
# lands on /dev/sdb (41G free at last check) instead of /dev/sda (3.9G
# free at the time).
#
# Invariants the audit enforces:
#  1. The source path is a symlink (not a real directory).
#  2. The symlink resolves to the declared target.
#  3. The target exists and is a directory.
#  4. The target lives on /dev/sdb1, not /dev/sda1.
#
# Restore.sh creates the target dirs on a fresh host before symlinking
# so it survives the first-boot no-data-volume case (see scripts/restore.sh).
# backup-mercury-state.sh EXCLUDES these symlinks — the cache data is
# rebuildable from registry/cache sources and is intentionally not
# captured in the daily tarball (also already documented in the script).
user_cache_paths:
  - symlink: /home/ubuntu/.cache
    target: /home/ubuntu/data/.cache
    kind: symlink-dir
    relocated_at: "2026-07-05"
    moved_size_mb: 3500
    moved_contents:
      - ms-playwright         # 961M — chromium + ffmpeg
      - opencode             # 1.5G — session indexes + models
      - uv                   # 526M — Python wheels archive
      - huggingface          # 464M — STT/TTS model files
      - pnpm                 # 342M — pnpm cache
      - node-gyp             # 194M — node native compile cache
      - electron             # chromium-style cache
      - pip                  # python pip cache
      - typescript           # 16M — TS Language Server
      - node                 # 100M — npm cache
      - fonts/fontconfig     # fontconfig cache
      - devtools-upgrade     # cargo + rustup cache
      - gh                   # gh CLI cache
      - starship             # shell prompt cache
    rebuilt_by: |
      Each cache entry is rebuildable from its source registry on first
      use; loss of the cache is not catastrophic. e.g. pnpm cache
      rebuilds on next install; playwright cache rebuilds on first
      `playwright install`; uv cache rebuilds on next `uv pip install`.
    backup_covered_by: null   # caches are EXCLUDED from backup-mercury-state.sh
  - symlink: /home/ubuntu/.local/share
    target: /home/ubuntu/data/.local/share
    kind: symlink-dir
    relocated_at: "2026-07-05"
    moved_size_mb: 1360
    moved_contents:
      - pnpm                 # 639M — pnpm store (hardlinked phantom-symlink content-addressed)
      - opencode             # 592M — opencode session + settings
      - uv                   # 99M  — uv cache (also at .cache/uv; this is metadata)
      - goose                # 30M  — goose AI assistant cache
      - opentui, tirith, rtk # misc agent tooling caches
    rebuilt_by: |
      pnpm store rebuilds on `pnpm install`; opencode session rebuilds
      from /home/ubuntu/data/code/<project>/.git or live data; goose +
      opentui caches rebuild on first use.
    backup_covered_by: null   # caches are EXCLUDED from backup-mercury-state.sh

